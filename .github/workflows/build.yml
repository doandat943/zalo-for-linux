name: Build Zalo for Linux

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
      - feat/cli-automation
  workflow_dispatch:
    inputs:
      zalo_version:
        description: 'Zalo Version (leave empty for latest)'
        required: false
        default: ''
        type: string
      zadark_version:
        description: 'ZaDark Version/Tag/Commit (leave empty for latest)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Cache Electron binaries
      uses: actions/cache@v3
      with:
        path: ~/.cache/electron
        key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-electron-
          
    - name: Install Node.js dependencies
      run: npm ci --prefer-offline --no-audit

    - name: Setup and Build
      id: build
      env:
        ZALO_VERSION: ${{ github.event.inputs.zalo_version }}
        ZADARK_VERSION: ${{ github.event.inputs.zadark_version }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: npm run main

    - name: Update README version
      if: steps.build.outputs.build == 'true'
      run: |
        VERSION=${{ steps.build.outputs.zalo_version }}
        ZADARK_NAME=${{ steps.build.outputs.zadark_appimage_name }}
        ORIGINAL_NAME=${{ steps.build.outputs.original_appimage_name }}
        REPO=${{ github.repository }}

        # Update ZaDark lines
        sed -i "/# ZADARK_WGET/{n;s|wget .*|wget https://github.com/$REPO/releases/download/v$VERSION/$ZADARK_NAME|}" README.md
        sed -i "/# ZADARK_INTEGRATE/{n;s|flatpak run .* --integrate .* --yes|flatpak run it.mijorus.gearlever --integrate $ZADARK_NAME --yes|}" README.md

        # Update Original lines
        sed -i "/# ORIGINAL_WGET/{n;s|wget .*|wget https://github.com/$REPO/releases/download/v$VERSION/$ORIGINAL_NAME|}" README.md
        sed -i "/# ORIGINAL_INTEGRATE/{n;s|flatpak run .* --integrate .* --yes|flatpak run it.mijorus.gearlever --integrate $ORIGINAL_NAME --yes|}" README.md
        
        # Setup git
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Commit and push if changed
        git add README.md
        git commit -m "chore: update README for version v$VERSION [skip ci]" || echo "No changes to commit"
        git push

    - name: Upload Original AppImage artifact
      if: steps.build.outputs.build == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.build.outputs.original_appimage_name }}
        path: ${{ steps.build.outputs.original_appimage_file }}
        retention-days: 30
        
    - name: Upload ZaDark AppImage artifact
      if: steps.build.outputs.build == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.build.outputs.zadark_appimage_name }}
        path: ${{ steps.build.outputs.zadark_appimage_file }}
        retention-days: 30
        
    - name: Create Release
      if: steps.build.outputs.build == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.build.outputs.zalo_version }}
        name: ${{ steps.build.outputs.zalo_version }}
        body: |
          ## 🚀 Quick Start (CLI)

          ### Option 1: ZaDark Variant (Dark Mode + Privacy)
          ```bash
          # 1. Install Gear Lever (if not already installed)
          flatpak install flathub it.mijorus.gearlever -y

          # 2. Download the AppImage
          wget https://github.com/${{ github.repository }}/releases/download/${{ steps.build.outputs.zalo_version }}/${{ steps.build.outputs.zadark_appimage_name }}

          # 3. Install and integrate with Gear Lever
          flatpak run it.mijorus.gearlever --integrate ${{ steps.build.outputs.zadark_appimage_name }} --yes

          # 4. Configure auto-updates
          flatpak run it.mijorus.gearlever --set-update-source ~/AppImages/zalo.appimage \
              --manager GithubUpdater \
              repo_url=https://github.com/${{ github.repository }} \
              repo_filename="Zalo-*+ZaDark-*-*.AppImage" \
              allow_prereleases=false
          ```

          ### Option 2: Original Variant (Standard)
          ```bash
          # 1. Install Gear Lever (if not already installed)
          flatpak install flathub it.mijorus.gearlever -y

          # 2. Download the AppImage
          wget https://github.com/${{ github.repository }}/releases/download/${{ steps.build.outputs.zalo_version }}/${{ steps.build.outputs.original_appimage_name }}

          # 3. Install and integrate with Gear Lever
          flatpak run it.mijorus.gearlever --integrate ${{ steps.build.outputs.original_appimage_name }} --yes

          # 4. Configure auto-updates
          flatpak run it.mijorus.gearlever --set-update-source ~/AppImages/zalo.appimage \
              --manager GithubUpdater \
              repo_url=https://github.com/${{ github.repository }} \
              repo_filename="Zalo-*-*.AppImage" \
              allow_prereleases=false
          ```

          ## 🔄 Automatic Updates
          Gear Lever notifies you when a new version is available. To manually check and install updates for all integrated apps via CLI, use:
          ```bash
          flatpak run it.mijorus.gearlever --update --all --yes
          ```

          ## 📋 System Requirements
          - Linux x64
          - GLIBC 2.28 or later
          
          ## 🐛 Issues & Support
          Please report issues in the [GitHub Issues](https://github.com/${{ github.repository }}/issues) section.

        files: |
          ${{ steps.build.outputs.original_appimage_file }}
          ${{ steps.build.outputs.zadark_appimage_file }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cleanup old release assets
      if: steps.build.outputs.build == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_TAG: ${{ steps.build.outputs.zalo_version }}
        CURRENT_COMMIT: ${{ env.COMMIT_HASH }}
      run: |
        set -euo pipefail

        echo "Cleaning up assets for release $RELEASE_TAG (keeping commit $CURRENT_COMMIT)"

        asset_names=$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' || true)

        if [ -z "$asset_names" ]; then
          echo "No assets found for release $RELEASE_TAG"
          exit 0
        fi

        for name in $asset_names; do
          if [[ "$name" == Zalo-*.AppImage ]] && [[ "$name" != *"$CURRENT_COMMIT"* ]]; then
            echo "Removing old asset: $name"
            gh release delete-asset "$RELEASE_TAG" "$name" --yes
          fi
        done
